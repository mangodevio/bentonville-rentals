<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMap</title>
<!-- preconnect to CDNs so DNS+TLS happen before they're needed -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://a.basemaps.cartocdn.com">
<link rel="preconnect" href="https://b.basemaps.cartocdn.com">
<link rel="preconnect" href="https://c.basemaps.cartocdn.com">
<link rel="preconnect" href="https://tiles.stadiamaps.com">
<!-- leaflet CSS: non-render-blocking on first paint -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"></noscript>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;
    --gray:#64748b;--bg:#0f172a;--surface:#1e293b;--surface2:#334155;
    --text:#f1f5f9;--text2:#94a3b8;--border:#334155;
    --radius:12px;--safe-bottom:env(safe-area-inset-bottom,0px)
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100dvh}

  /* ── header ── */
  header{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px 8px;background:var(--surface);
    border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0
  }
  header h1{font-size:15px;font-weight:700;flex:1;letter-spacing:-.3px}
  .tab-btns{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px}
  .tab-btn{
    padding:4px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;
    cursor:pointer;background:transparent;color:var(--text2);transition:.15s
  }
  .tab-btn.active{background:var(--surface2);color:var(--text)}

  /* ── skin bar ── */
  #skin-bar{
    display:flex;gap:4px;padding:6px 10px;background:var(--surface);
    border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;
    scrollbar-width:none
  }
  #skin-bar::-webkit-scrollbar{display:none}
  .skin-btn{
    flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);
    font-size:11px;font-weight:600;cursor:pointer;background:transparent;
    color:var(--text2);white-space:nowrap;transition:.15s
  }
  .skin-btn.active{background:var(--surface2);color:var(--text);border-color:var(--text2)}

  /* ── map view ── */
  #map-view{flex:1;position:relative;overflow:hidden}
  #map{width:100%;height:100%}

  /* ── bottom sheet ── */
  #sheet{
    position:absolute;bottom:0;left:0;right:0;z-index:900;
    background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
    border-top:1px solid var(--border);
    transform:translateY(calc(100% - 52px));
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    padding-bottom:var(--safe-bottom);max-height:72vh;display:flex;flex-direction:column
  }
  #sheet.open{transform:translateY(0)}
  #sheet-handle{
    flex-shrink:0;padding:10px 0 6px;display:flex;flex-direction:column;
    align-items:center;gap:6px;cursor:pointer
  }
  .handle-bar{width:36px;height:4px;background:var(--surface2);border-radius:2px}
  #sheet-peek{
    font-size:13px;font-weight:600;color:var(--text2);padding:0 16px 4px;
    display:flex;align-items:center;gap:8px
  }
  #sheet-content{overflow-y:auto;padding:0 16px 16px;flex:1}
  .prop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .prop-name{font-size:16px;font-weight:700;line-height:1.3}
  .prop-price{font-size:18px;font-weight:800;color:var(--green)}
  .prop-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600
  }
  .badge-green{background:#14532d;color:#86efac}
  .badge-amber{background:#451a03;color:#fcd34d}
  .badge-red{background:#450a0a;color:#fca5a5}
  .badge-gray{background:var(--surface2);color:var(--text2)}
  .badge-blue{background:#1e3a5f;color:#93c5fd}
  .badge-purple{background:#3b0764;color:#d8b4fe}

  .dist-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
  .dist-card{background:var(--surface2);border-radius:8px;padding:10px}
  .dist-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px}
  .dist-val{font-size:14px;font-weight:700}

  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:12px 0 8px}
  .nearby-list{display:flex;flex-direction:column;gap:6px}
  .nearby-item{
    display:flex;align-items:center;gap:10px;
    background:var(--surface2);border-radius:8px;padding:10px;cursor:pointer;
    border:1px solid transparent;transition:.15s
  }
  .nearby-item:active{border-color:var(--blue)}
  .nearby-item.duplex{border-color:#7c3aed55;background:#1e0a3c}
  .nearby-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .nearby-info{flex:1;min-width:0}
  .nearby-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nearby-sub{font-size:11px;color:var(--text2)}
  .nearby-dist{font-size:13px;font-weight:700;flex-shrink:0}

  .friend-btn{
    width:100%;padding:12px;border-radius:8px;border:none;
    font-size:13px;font-weight:700;cursor:pointer;margin-bottom:4px;
    background:#1e3a5f;color:#93c5fd;transition:.15s
  }
  .friend-btn.active{background:#7c3aed;color:#fff}
  .friend-banner{
    background:#3b0764;border:1px solid #7c3aed44;border-radius:8px;
    padding:8px 12px;font-size:12px;color:#d8b4fe;margin-bottom:8px;
    display:none
  }
  .friend-banner.show{display:block}

  /* ── sort bar ── */
  #sort-bar{
    display:none;gap:6px;padding:8px 12px;background:var(--surface);
    border-bottom:1px solid var(--border);align-items:center;flex-shrink:0
  }
  #sort-bar.active{display:flex}
  #sort-bar span{font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
  .sort-btn{
    flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);
    font-size:11px;font-weight:600;cursor:pointer;background:transparent;
    color:var(--text2);white-space:nowrap;transition:.15s
  }
  .sort-btn.active{background:var(--surface2);color:var(--text);border-color:var(--text2)}

  /* ── list view ── */
  #list-view{flex:1;overflow-y:auto;display:none;padding:12px}
  #list-view.active{display:block}
  .list-group{margin-bottom:20px}
  .list-group-title{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    color:var(--text2);padding:0 4px 8px
  }
  .list-card{
    background:var(--surface);border-radius:var(--radius);padding:14px;
    margin-bottom:8px;border:1px solid var(--border);cursor:pointer
  }
  .list-card:active{border-color:var(--blue)}
  .list-card-row{display:flex;justify-content:space-between;align-items:flex-start}
  .list-card-name{font-size:14px;font-weight:700}
  .list-card-price{font-size:15px;font-weight:800;color:var(--green)}
  .list-card-sub{font-size:12px;color:var(--text2);margin-top:4px}
  .list-card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

  /* ── legend ── */
  #legend{
    position:absolute;top:10px;right:10px;z-index:800;
    background:#1e293bee;
    border-radius:8px;padding:8px 10px;border:1px solid var(--border);
    font-size:11px;display:flex;flex-direction:column;gap:4px;min-width:130px
  }
  .leg{display:flex;align-items:center;gap:6px}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

  /* ── FAB (add property button) ── */
  #fab{
    position:absolute;bottom:calc(60px + var(--safe-bottom));right:14px;z-index:850;
    width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:var(--blue);color:#fff;font-size:24px;font-weight:300;
    box-shadow:0 4px 16px #0006;display:flex;align-items:center;justify-content:center;
    transition:.15s;line-height:1
  }
  #fab:active{transform:scale(.92)}

  /* ── Add property modal ── */
  #modal-overlay{
    position:fixed;inset:0;z-index:2000;background:#000a;
    display:none;align-items:flex-end;justify-content:center
  }
  #modal-overlay.show{display:flex}
  #modal-box{
    background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
    width:100%;max-width:480px;padding:20px 20px calc(20px + var(--safe-bottom));
    border-top:1px solid var(--border)
  }
  #modal-box h2{font-size:16px;font-weight:700;margin-bottom:16px}
  .modal-field{margin-bottom:12px}
  .modal-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px}
  .modal-input{
    width:100%;padding:11px 12px;background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;outline:none;
    font-family:inherit;transition:.15s
  }
  .modal-input:focus{border-color:var(--blue)}
  .modal-input::placeholder{color:var(--text2)}
  #modal-status{
    font-size:12px;color:var(--text2);min-height:18px;margin-bottom:12px;
    display:flex;align-items:center;gap:6px
  }
  #modal-status.err{color:#fca5a5}
  #modal-status.ok{color:#86efac}
  .modal-btns{display:flex;gap:8px}
  .modal-btn{
    flex:1;padding:13px;border-radius:8px;border:none;font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:.15s
  }
  .modal-btn-primary{background:var(--blue);color:#fff}
  .modal-btn-primary:disabled{background:var(--surface2);color:var(--text2);cursor:default}
  .modal-btn-cancel{background:var(--surface2);color:var(--text2)}

  /* ── leaflet overrides ── */
  .leaflet-container{background:#1a2332}
  /* tile filter only applied when dark skin is active — avoids GPU recomposition cost on every tile for light skins */
  .skin-dark .leaflet-tile{filter:brightness(.72) saturate(.55)}
  .prop-marker{
    width:32px;height:32px;border-radius:50%;border:2.5px solid #fff4;
    display:flex;align-items:center;justify-content:center;font-size:14px;
    box-shadow:0 2px 8px #0006;cursor:pointer;transition:.15s
  }
  .prop-marker.selected{transform:scale(1.25);border-color:#fff;box-shadow:0 0 0 3px #fff4}
  .special-marker{
    width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-size:16px;box-shadow:0 2px 8px #0006
  }
  .duplex-ring{
    width:64px;height:64px;border-radius:50%;border:2px dashed #7c3aed99;
    pointer-events:none
  }
  .leaflet-popup-content-wrapper{
    background:var(--surface);color:var(--text);border-radius:8px;
    border:1px solid var(--border);box-shadow:0 4px 16px #0008
  }
  .leaflet-popup-tip{background:var(--surface)}
  .leaflet-popup-content{margin:10px 12px;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📍 RentMap</h1>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="setTab('map')">Map</button>
      <button class="tab-btn" onclick="setTab('list')">List</button>
    </div>
  </header>
  <div id="skin-bar">
    <button class="skin-btn active" data-skin="dark"       onclick="setSkin('dark')">🌑 Dark</button>
    <button class="skin-btn"        data-skin="minimal"    onclick="setSkin('minimal')">⬜ Clean</button>
    <button class="skin-btn"        data-skin="satellite"  onclick="setSkin('satellite')">🛰 Satellite</button>
    <button class="skin-btn"        data-skin="terrain"    onclick="setSkin('terrain')">🗻 Terrain</button>
    <button class="skin-btn"        data-skin="watercolor" onclick="setSkin('watercolor')">🎨 Watercolor</button>
  </div>

  <div id="sort-bar">
    <span>Sort:</span>
    <button class="sort-btn active" data-sort="default" onclick="setSort('default')">Default</button>
    <button class="sort-btn" data-sort="price-asc"  onclick="setSort('price-asc')">Price ↑</button>
    <button class="sort-btn" data-sort="price-desc" onclick="setSort('price-desc')">Price ↓</button>
    <button class="sort-btn" data-sort="mosque"     onclick="setSort('mosque')">Mosque ↑</button>
    <button class="sort-btn" data-sort="work"       onclick="setSort('work')">Work ↑</button>
    <button class="sort-btn" data-sort="movein"     onclick="setSort('movein')">Move-in ↑</button>
  </div>

  <div id="map-view">
    <div id="map"></div>
    <div id="legend">
      <div class="leg"><div class="leg-dot" style="background:#16a34a"></div>Available</div>
      <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Check avail.</div>
      <div class="leg"><div class="leg-dot" style="background:#dc2626"></div>Likely rented</div>
      <div class="leg"><div class="leg-dot" style="background:#7c3aed"></div>Mosque</div>
      <div class="leg"><div class="leg-dot" style="background:#2563eb"></div>Work</div>
    </div>
    <div id="sheet">
      <div id="sheet-handle" onclick="toggleSheet()">
        <div class="handle-bar"></div>
        <div id="sheet-peek">Tap a property</div>
      </div>
      <div id="sheet-content"></div>
    </div>
  </div>

  <div id="list-view"></div>
</div>

<!-- FAB -->
<button id="fab" onclick="openModal()" title="Add a property">+</button>

<!-- Add property modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal-box">
    <h2>📍 Add a Property</h2>
    <div class="modal-field">
      <label>Address</label>
      <input id="modal-addr" class="modal-input" type="text" placeholder="e.g. 123 Main St, Bentonville, AR" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label>Your name <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input id="modal-name" class="modal-input" type="text" placeholder="e.g. Ashfaq"/>
    </div>
    <div class="modal-field">
      <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input id="modal-notes" class="modal-input" type="text" placeholder="e.g. $1,600/mo, 3bd/2ba"/>
    </div>
    <div id="modal-status"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-submit" class="modal-btn modal-btn-primary" onclick="submitCustomProp()">Add to Map</button>
    </div>
  </div>
</div>

// ── Haversine distance (meters) ───────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLng = (b.lng - a.lng) * toR;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}
function fmtDist(m) {
  if (m < 1000) return Math.round(m) + ' m';
  return (m/1609.34).toFixed(1) + ' mi';
}
function fmtDistShort(m) {
  if (m < 100) return '~' + Math.round(m) + 'm away';
  if (m < 1000) return Math.round(m/10)*10 + 'm away';
  return (m/1609.34).toFixed(1) + ' mi away';
}

// Calibrated against user's confirmed values from 1406 Casuarina:
//   Mosque: 3.1mi / 9min (straight ~1.78mi → road factor 1.74, avg 20.7mph)
//   DGTC:   5.7mi / 13min (straight ~2.84mi → road factor 2.01, avg 26.3mph)
//   Walmart: ~same area as DGTC
function driveTo(from, dest) {
  const straight = haversine(from, dest) / 1609.34;
  const cfg = dest.id === 'mosque'
    ? { factor: 1.74, mph: 20.7 }
    : { factor: 2.01, mph: 26.3 };
  const roadMi = straight * cfg.factor;
  return { mi: roadMi.toFixed(1), mins: Math.max(1, Math.round(roadMi / cfg.mph * 60)) };
}

function distBadgesHTML(p) {
  return DESTS.map(d => {
    const { mi, mins } = driveTo(p, d);
    return `<span class="badge" style="background:${d.color}22;color:${d.color};border:1px solid ${d.color}44">
      ${d.icon} ${mi}mi · ${mins}min
    </span>`;
  }).join('');
}

// ── Tile skins — swap the URL to change the map look ─────────────────────────
// 1. Dark (current)    → CartoDB Dark Matter
// 2. Minimal/clean     → CartoDB Positron
// 3. Satellite         → ESRI World Imagery
// 4. Terrain           → Stadia Stamen Terrain
// 5. Watercolor        → Stadia Stamen Watercolor
// 6. Original OSM      → openstreetmap.org
const TILES = {
  dark:      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  minimal:   'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  terrain:   'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png',
  watercolor:'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
  osm:       'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
};
let activeTile = L.tileLayer(TILES.dark, { maxZoom: 19 }).addTo(map);

function setSkin(name) {
  map.removeLayer(activeTile);
  activeTile = L.tileLayer(TILES[name], { maxZoom: 19, keepBuffer: 2 }).addTo(map);
  activeTile.bringToBack();
  document.querySelectorAll('.skin-btn').forEach(b => b.classList.toggle('active', b.dataset.skin === name));
  const mapEl = document.getElementById('map');
  mapEl.className = name === 'dark' ? 'skin-dark' : '';
  const light = name !== 'dark';
  document.getElementById('legend').style.background = light ? '#ffffffee' : '#1e293bee';
  document.getElementById('legend').style.color = light ? '#1e293b' : 'var(--text)';
}
L.control.zoom({ position: 'topright' }).addTo(map);

function makeIcon(color, emoji, selected=false) {
  return L.divIcon({
    className: '',
    html: `<div class="prop-marker${selected?' selected':''}" style="background:${color}88;border-color:${color}">${emoji}</div>`,
    iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -20]

}
function makeSpecialIcon(color, emoji) {
  return L.divIcon({
    className: '',

    iconSize: [34, 34], iconAnchor: [17, 17]

});

// Draw duplex rings
const duplexGroups = {};
PROPS.forEach(p => { if (p.duplex) { (duplexGroups[p.duplex] = duplexGroups[p.duplex]||[]).push(p); } });
Object.values(duplexGroups).forEach(grp => {
  if (grp.length < 2) return;
  const centerLat = grp.reduce((s,p)=>s+p.lat,0)/grp.length;
  const centerLng = grp.reduce((s,p)=>s+p.lng,0)/grp.length;
  L.circle([centerLat, centerLng], {
    radius: 30, color: '#7c3aed', weight: 2,
    dashArray: '4 4', fillOpacity: 0.06, fillColor: '#7c3aed'
  }).addTo(map);
});

// ── Select prop ───────────────────────────────────────────────────────────────
function propEmoji(p) {
  if (!p) return '🏠';
  if (p.isCustom) return '📍';
  if (p.id.includes('bldg')) return '🏢';
  return '🏠';
}

function selectProp(id) {
  // reset old
  if (selectedId && leafletMarkers[selectedId]) {
    const { marker, color } = leafletMarkers[selectedId];
    const oldP = PROPS.find(p=>p.id===selectedId);
    marker.setIcon(makeIcon(color, propEmoji(oldP), false));
  }
  selectedId = id;
  const { marker, color } = leafletMarkers[id];
  const p = PROPS.find(p=>p.id===id);
  marker.setIcon(makeIcon(color, propEmoji(p), true));
  map.panTo([p.lat, p.lng], { animate: true, duration: 0.5 });
  renderSheet(p);
  openSheet();
  renderListView(); // refresh list to reflect friend context
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function toggleSheet() { sheetOpen ? closeSheet() : openSheet(); }
function openSheet()  { sheetOpen = true;  document.getElementById('sheet').classList.add('open'); }
function closeSheet() { sheetOpen = false; document.getElementById('sheet').classList.remove('open'); }

function renderSheet(p) {
  const isFriend = friendId === p.id;

  // Nearby list — sort by distance, highlight duplexes first
  const nearby = PROPS
    .filter(o => o.id !== p.id && !o.id.includes('bldg'))
    .map(o => ({ ...o, dist: haversine(p, o) }))
    .sort((a, b) => {
      // same duplex first
      const aD = p.duplex && a.duplex === p.duplex;
      const bD = p.duplex && b.duplex === p.duplex;
      if (aD && !bD) return -1;
      if (!aD && bD) return 1;
      return a.dist - b.dist;
    });

  const nearbyHTML = nearby.slice(0, 8).map(o => {
    const isDuplex = p.duplex && o.duplex === p.duplex;
    const dot = STATUS_COLOR[o.status] || '#64748b';
    return `<div class="nearby-item${isDuplex?' duplex':''}" onclick="selectProp('${o.id}')">
      <div class="nearby-dot" style="background:${dot}"></div>
      <div class="nearby-info">
        <div class="nearby-name">${o.name}</div>
        <div class="nearby-sub">${isDuplex ? '🏘️ SAME DUPLEX · ' : ''}${o.priceStr}/mo · ${o.movein}</div>
      </div>
      <div class="nearby-dist" style="color:${isDuplex?'#d8b4fe':'var(--text2)'}">${fmtDistShort(o.dist)}</div>
    </div>`;
  }).join('');

  const friendBanner = friendId && friendId !== p.id
    ? `<div class="friend-banner show">📍 ${fmtDist(haversine(PROPS.find(f=>f.id===friendId), p))} from friend's place (${PROPS.find(f=>f.id===friendId)?.name})</div>`
    : '';

  document.getElementById('sheet-peek').textContent = `${p.name} · ${p.priceStr}/mo`;
  document.getElementById('sheet-content').innerHTML = `
    ${friendBanner}
    <div class="prop-header">
      <div>
        <div class="prop-name">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${p.sub}</div>
      </div>
      <div class="prop-price">${p.priceStr}<span style="font-size:12px;font-weight:500;color:var(--text2)">/mo</span></div>
    </div>
    <div class="prop-meta">
      ${statusBadge(p)}
      <span class="badge badge-gray">📅 ${p.movein}</span>
      <span class="badge badge-gray">🛏 ${p.beds}bd · 🚿 ${p.baths}ba · ${p.sqft} sqft</span>
      ${p.duplex ? '<span class="badge" style="background:#3b0764;color:#d8b4fe">🏘️ Duplex unit</span>' : ''}
      ${p.manager !== 'Prestige NWA' ? `<span class="badge badge-amber">⚠️ ${p.manager}</span>` : ''}
    </div>
    <div class="dist-row">
      ${DESTS.map(d => {
        const {mi, mins} = driveTo(p, d);
        return `<div class="dist-card" style="border-left:3px solid ${d.color}">
          <div class="dist-label" style="color:${d.color}">${d.icon} ${d.name.split(' ')[0]}</div>
          <div class="dist-val">${mi} mi</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;font-weight:600">~${mins} min drive</div>
        </div>`;
      }).join('')}
    </div>
    <button class="friend-btn${isFriend?' active':''}" onclick="toggleFriend('${p.id}')">
      ${isFriend ? "✅ Friend's place set here" : "📌 Set as friend's place"}
    </button>
    <div class="section-title">Nearest Properties</div>
    <div class="nearby-list">${nearbyHTML}</div>
    <div style="margin-top:12px">
      <a href="${p.url}" target="_blank" style="color:#60a5fa;font-size:12px;font-weight:600">🔗 View listing →</a>
      ${p.notes ? `<div style="font-size:11px;color:var(--text2);margin-top:6px">ℹ️ ${p.notes}</div>` : ''}
    </div>
  `;
}

function toggleFriend(id) {
  friendId = friendId === id ? null : id;
  const p = PROPS.find(p=>p.id===id);
  if (p) renderSheet(p);
  renderListView();
}

// ── List view ─────────────────────────────────────────────────────────────────
function renderListView() {
  const groups = [
    { label: '✅ Available Now / Soon', filter: p => p.status === 'available' && !p.id.includes('bldg') && !p.isCustom },
    { label: '⚠️ Check Availability (date passed)', filter: p => p.status === 'check' && !p.isCustom },
    { label: '🏘️ Duplex Pairs (both units listed)', filter: p => {
        if (!p.duplex || p.id.includes('bldg') || p.isCustom) return false;
        const count = PROPS.filter(o => o.duplex === p.duplex).length;
        return count >= 2;
      }
    },
    { label: '📍 Added Properties', filter: p => !!p.isCustom },
  ];

  const friend = PROPS.find(p=>p.id===friendId);
  const friendNote = friend ? `<div style="background:#3b0764;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#d8b4fe">📌 Friend's place: <b>${friend.name}</b> — showing distances from there</div>` : '';

  const html = groups.map(g => {
    const items = sortProps(PROPS.filter(g.filter)).map(p => {
      const distF = friend && friend.id !== p.id ? haversine(friend, p) : null;
      const isDuplex = friend && friend.duplex && p.duplex === friend.duplex;
      const clickFn = p.isCustom ? `selectCustom('${p.id}');setTab('map')` : `selectProp('${p.id}');setTab('map')`;
      return `<div class="list-card" onclick="${clickFn}">
        <div class="list-card-row">
          <div>
            <div class="list-card-name">${p.name}</div>
            <div class="list-card-sub">${p.isCustom ? (p.notes || 'Custom property') : `${p.sub} · ${p.beds}bd/${p.baths}ba · ${p.sqft}sqft`}</div>
          </div>
          ${p.isCustom ? '<span class="badge" style="background:#431407;color:#fb923c">📍 Custom</span>' : `<div class="list-card-price">${p.priceStr}</div>`}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:8px 0">
          ${DESTS.map(d => {
            const {mi, mins} = driveTo(p, d);
            return `<div style="background:${d.color}18;border:1px solid ${d.color}33;border-radius:7px;padding:5px 6px;text-align:center">
              <div style="font-size:10px;color:${d.color};font-weight:700">${d.icon} ${d.name.split(' ')[0]}</div>
              <div style="font-size:13px;font-weight:800;color:var(--text)">${mi}mi</div>
              <div style="font-size:10px;color:var(--text2)">${mins} min</div>
            </div>`;
          }).join('')}
        </div>
        <div class="list-card-badges">
          ${p.isCustom ? (p.addedBy ? `<span class="badge badge-gray">👤 ${p.addedBy}</span>` : '') : statusBadge(p)}
          ${!p.isCustom ? `<span class="badge badge-gray">📅 ${p.movein}</span>` : ''}
          ${distF !== null ? `<span class="badge" style="background:${isDuplex?'#3b0764':'#1e293b'};color:${isDuplex?'#d8b4fe':'#94a3b8'}">${isDuplex?'🏘️ DUPLEX · ':''}${fmtDistShort(distF)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
    if (!items) return '';
    return `<div class="list-group"><div class="list-group-title">${g.label}</div>${items}</div>`;
  }).join('');

  document.getElementById('list-view').innerHTML = friendNote + html;
}

// ── Sort helpers ──────────────────────────────────────────────────────────────
function parseMoveinDate(p) {
  // Strip decorators: ~, ⚠️, (now), (date passed), etc.
  const s = (p.movein || '').replace(/[~⚠️]/g,'').replace(/\(.*?\)/g,'').trim();
  const d = new Date(s);
  return isNaN(d) ? new Date('2099-01-01') : d;
}

// ── Sort ──────────────────────────────────────────────────────────────────────
let currentSort = 'default';
function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s));
  renderListView();
}
function sortProps(items) {
  if (currentSort === 'price-asc')  return [...items].sort((a,b) => a.price - b.price);
  if (currentSort === 'price-desc') return [...items].sort((a,b) => b.price - a.price);
  if (currentSort === 'mosque')     return [...items].sort((a,b) => haversine(a, MOSQUE) - haversine(b, MOSQUE));
  if (currentSort === 'work')       return [...items].sort((a,b) => haversine(a, WORK)   - haversine(b, WORK));
  if (currentSort === 'movein')     return [...items].sort((a,b) => parseMoveinDate(a) - parseMoveinDate(b));
  return items;
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='map'&&i===0)||(tab==='list'&&i===1)));
  document.getElementById('map-view').style.display  = tab === 'map'  ? 'block' : 'none';
  document.getElementById('list-view').classList.toggle('active', tab === 'list');
  document.getElementById('sort-bar').classList.toggle('active', tab === 'list');
  if (tab === 'list') renderListView();
  if (tab === 'map')  setTimeout(() => map.invalidateSize(), 50);
}

// ── Custom properties (Neon via Netlify Function) ────────────────────────────
const API = '/api/props';

function customPropToLocal(row) {
  return {
    id: row.id,
    name: row.name,
    sub: row.address || 'Custom property',
    lat: parseFloat(row.lat),
    lng: parseFloat(row.lng),
    price: null,
    priceStr: '—',
    beds: '?', baths: '?', sqft: '?',
    movein: '—',
    status: 'available',
    duplex: null,
    manager: row.added_by ? `Added by ${row.added_by}` : 'Added manually',
    sources: 'Custom',
    notes: row.notes || '',
    url: '',
    isCustom: true,
    addedBy: row.added_by || null,
  };
}

function addCustomMarker(p) {
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon('#f97316', '📍') }).addTo(map);
  marker.on('click', () => selectCustom(p.id));
  leafletMarkers[p.id] = { marker, color: '#f97316' };
}

function selectCustom(id) {
  const p = PROPS.find(x => x.id === id);
  if (!p) return;
  if (selectedId && leafletMarkers[selectedId]) {
    const old = leafletMarkers[selectedId];
    const oldP = PROPS.find(x => x.id === selectedId);
    if (oldP) {
      const emoji = oldP.isCustom ? '📍' : (selectedId.includes('bldg') ? '🏢' : '🏠');
      old.marker.setIcon(makeIcon(old.color, emoji, false));
    }
  }
  selectedId = id;
  leafletMarkers[id].marker.setIcon(makeIcon('#f97316', '📍', true));
  map.panTo([p.lat, p.lng], { animate: true, duration: 0.5 });
  renderCustomSheet(p);
  openSheet();
}

function renderCustomSheet(p) {
  document.getElementById('sheet-peek').textContent = p.name;
  document.getElementById('sheet-content').innerHTML = `
    <div class="prop-header">
      <div>
        <div class="prop-name">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${p.sub}</div>
      </div>
      <span class="badge" style="background:#431407;color:#fb923c;align-self:flex-start">📍 Custom</span>
    </div>
    <div class="prop-meta">
      ${p.addedBy ? `<span class="badge badge-gray">👤 Added by ${p.addedBy}</span>` : ''}
      ${p.notes ? `<span class="badge badge-gray">ℹ️ ${p.notes}</span>` : ''}
    </div>
    <div class="dist-row">
      ${DESTS.map(d => {
        const {mi, mins} = driveTo(p, d);
        return `<div class="dist-card" style="border-left:3px solid ${d.color}">
          <div class="dist-label" style="color:${d.color}">${d.icon} ${d.name.split(' ')[0]}</div>
          <div class="dist-val">${mi} mi</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;font-weight:600">~${mins} min drive</div>
        </div>`;
      }).join('')}
    </div>
    <button onclick="deleteCustomProp('${p.id}')" style="width:100%;padding:11px;border-radius:8px;border:1px solid #dc2626;background:transparent;color:#fca5a5;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">
      🗑 Remove this property
    </button>
  `;
}

async function loadCustomProps() {
  try {
    const res = await fetch(API);
    if (!res.ok) return;
    const rows = await res.json();
    rows.forEach(row => {
      if (PROPS.find(p => p.id === row.id)) return; // already loaded
      const p = customPropToLocal(row);
      PROPS.push(p);
      addCustomMarker(p);
    });
    renderListView();
  } catch(e) {
    console.warn('Could not load custom props:', e.message);
  }
}

async function saveCustomProp(data) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error(`Server error ${res.status}`);
}

async function deleteCustomProp(id) {
  try {
    await fetch(`${API}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    // Remove from PROPS
    const idx = PROPS.findIndex(p => p.id === id);
    if (idx !== -1) PROPS.splice(idx, 1);
    // Remove marker
    if (leafletMarkers[id]) {
      map.removeLayer(leafletMarkers[id].marker);
      delete leafletMarkers[id];
    }
    closeSheet();
    renderListView();
  } catch(e) {
    alert('Could not remove property.');
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-addr').value  = '';
  document.getElementById('modal-name').value  = '';
  document.getElementById('modal-notes').value = '';
  setModalStatus('');
  document.getElementById('modal-submit').disabled = false;
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('modal-addr').focus(), 100);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function setModalStatus(msg, type='') {
  const el = document.getElementById('modal-status');
  el.textContent = msg;
  el.className = type ? `${type}` : '';
}

async function geocodeAddress(addr) {
  const q = encodeURIComponent(addr);
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`, {
    headers: { 'Accept-Language': 'en' }
  });
  const data = await res.json();
  if (!data.length) throw new Error('Address not found — try adding ", AR" or a zip code');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
}

async function submitCustomProp() {
  const addr  = document.getElementById('modal-addr').value.trim();
  const name  = document.getElementById('modal-name').value.trim();
  const notes = document.getElementById('modal-notes').value.trim();

  if (!addr) { setModalStatus('Please enter an address.', 'err'); return; }

  const btn = document.getElementById('modal-submit');
  btn.disabled = true;
  setModalStatus('🔍 Looking up address…');

  try {
    const geo = await geocodeAddress(addr);
    setModalStatus('💾 Saving…');

    const id = 'custom-' + Date.now();
    const data = {
      id,
      name: addr,
      address: geo.display,
      lat: geo.lat,
      lng: geo.lng,
      added_by: name || null,
      notes: notes || null,
    };

    await saveCustomProp(data);

    const p = customPropToLocal({ ...data });
    PROPS.push(p);
    addCustomMarker(p);
    renderListView();

    closeModal();
    selectCustom(id);
    setTab('map');
  } catch(e) {
    setModalStatus(e.message || 'Something went wrong.', 'err');
    btn.disabled = false;
  }
}

// Enter key submits modal
document.getElementById('modal-addr').addEventListener('keydown', e => { if (e.key === 'Enter') submitCustomProp(); });
document.getElementById('modal-name').addEventListener('keydown', e => { if (e.key === 'Enter') submitCustomProp(); });
document.getElementById('modal-notes').addEventListener('keydown', e => { if (e.key === 'Enter') submitCustomProp(); });

// ── Init ──────────────────────────────────────────────────────────────────────
renderListView();
loadCustomProps();

// Swipe-down to close sheet
let touchStartY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive:true });
document.getElementById('sheet').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 60) closeSheet();
}, { passive:true });
</script>

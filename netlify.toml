[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/props"
  to     = "/.netlify/functions/props"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/props*"
  to     = "/.netlify/functions/props"
  status = 200
  force  = true
